name: Weekly Showcase

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate showcase picks with AI images
        env:
          FAL_AI_KEY: ${{ secrets.FAL_AI_KEY }}
        run: ./showcase.sh

      - name: Commit and push if changed
        run: |
          git diff --quiet showcase.json 2>/dev/null && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add showcase.json
          git commit -m "chore: refresh weekly showcase picks"
          git push
